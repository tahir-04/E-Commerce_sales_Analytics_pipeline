version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: ecommerce_postgres

    environment:
      POSTGRES_DB: ecommerce_dw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase
    container_name: ecommerce_metabase

    ports:
      - "3000:3000"

    depends_on:
      - postgres

volumes:
  postgres_data: